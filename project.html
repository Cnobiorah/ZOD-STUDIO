<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Project — ZöD Studio</title>
  <meta name="description" content="Project details — ZöD Studio architectural design and digital visualisation."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --stone:#0D0C0A; --ash:#1A1917; --sand:#F0EDE7; --warm:#C8BFB0;
      --muted:rgba(240,237,231,.45); --line:rgba(240,237,231,.12);
      --accent:#C9A96E;
      --serif:'Cormorant Garamond',Georgia,serif;
      --mono:'DM Mono','Courier New',monospace;
      --body:'Outfit',system-ui,sans-serif;
      --max:1280px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--stone);color:var(--sand);font-family:var(--body);font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
    a{color:inherit;text-decoration:none;}
    img{display:block;max-width:100%;}

    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.028;mix-blend-mode:screen;}

    .wrap{width:min(var(--max),calc(100% - 48px));margin:0 auto;position:relative;z-index:1;}

    /* HEADER */
    header{position:fixed;top:0;left:0;right:0;z-index:100;transition:background .4s ease;}
    header.scrolled{background:rgba(13,12,10,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);}
    .nav{display:flex;justify-content:space-between;align-items:center;padding:22px 0;transition:padding .4s ease;}
    header.scrolled .nav{padding:14px 0;}
    .brand{display:flex;flex-direction:column;line-height:1;user-select:none;}
    .brand-main{font-family:var(--serif);font-weight:300;font-size:32px;letter-spacing:.12em;color:var(--sand);transition:font-size .4s ease;}
    header.scrolled .brand-main{font-size:26px;}
    .brand-sub{font-family:var(--mono);font-size:9px;letter-spacing:.42em;text-transform:uppercase;color:var(--accent);margin-top:4px;}
    .nav-links{display:flex;align-items:center;gap:6px;list-style:none;}
    .nav-links a{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--warm);padding:8px 14px;border-radius:999px;border:1px solid transparent;transition:all .22s ease;}
    .nav-links a:hover{color:var(--sand);border-color:var(--line);background:rgba(240,237,231,.06);}
    .nav-cta{border-color:var(--accent)!important;color:var(--accent)!important;}
    .nav-cta:hover{background:var(--accent)!important;color:var(--stone)!important;}
    .menu-btn{display:none;background:none;border:1px solid var(--line);color:var(--sand);font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:8px 14px;border-radius:4px;cursor:pointer;}

    /* BREADCRUMB */
    .breadcrumb{padding:120px 0 20px;display:flex;gap:10px;align-items:center;}
    .breadcrumb a,.breadcrumb span{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
    .breadcrumb a:hover{color:var(--accent);}
    .breadcrumb .sep{color:rgba(240,237,231,.2);}

    /* HERO IMAGE */
    .project-hero{
      position:relative;width:100%;
      height:clamp(300px,50vh,580px);
      overflow:hidden;border-radius:2px;
      border:1px solid var(--line);
      margin-bottom:60px;
    }
    .project-hero img{width:100%;height:100%;object-fit:cover;display:block;}
    .hero-nav-btn{
      position:absolute;top:50%;transform:translateY(-50%);
      width:48px;height:48px;border-radius:50%;
      background:rgba(13,12,10,.65);backdrop-filter:blur(8px);
      border:1px solid var(--line);color:var(--sand);
      display:grid;place-items:center;cursor:pointer;
      transition:background .2s ease,border-color .2s ease;
    }
    .hero-nav-btn:hover{background:rgba(201,169,110,.2);border-color:var(--accent);}
    .hero-nav-btn.prev{left:16px;}
    .hero-nav-btn.next{right:16px;}
    .hero-counter{
      position:absolute;bottom:16px;right:16px;
      font-family:var(--mono);font-size:10px;letter-spacing:.2em;
      color:rgba(240,237,231,.7);
      background:rgba(13,12,10,.55);backdrop-filter:blur(6px);
      padding:6px 12px;border-radius:999px;
      border:1px solid var(--line);
    }

    /* LAYOUT */
    .project-layout{display:grid;grid-template-columns:1fr 340px;gap:48px;align-items:start;padding-bottom:100px;}
    @media(max-width:900px){.project-layout{grid-template-columns:1fr;}}

    /* LEFT: gallery + description */
    .gallery-thumbs{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:40px;scrollbar-width:none;}
    .gallery-thumbs::-webkit-scrollbar{display:none;}
    .thumb{
      flex:0 0 88px;height:60px;border-radius:2px;overflow:hidden;
      border:1px solid var(--line);cursor:pointer;opacity:.5;
      transition:opacity .2s,border-color .2s;
    }
    .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
    .thumb:hover{opacity:.8;}
    .thumb.active{opacity:1;border-color:var(--accent);}

    .project-desc h2{font-family:var(--serif);font-weight:300;font-size:clamp(32px,4vw,50px);line-height:1.05;letter-spacing:-.01em;margin-bottom:20px;}
    .project-desc h2 em{font-style:italic;color:var(--accent);}
    .project-desc p{color:var(--warm);font-size:15px;line-height:1.8;}

    /* RIGHT: sidebar */
    .sidebar{position:sticky;top:100px;}
    .sidebar-block{background:var(--ash);border:1px solid var(--line);border-radius:2px;padding:28px;margin-bottom:16px;}
    .sidebar-label{font-family:var(--mono);font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;}
    .specs-list{display:flex;flex-direction:column;gap:0;}
    .spec-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
    .spec-row:last-child{border-bottom:none;}
    .spec-key{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
    .spec-val{font-size:13px;color:var(--sand);text-align:right;}

    .cta-block{background:linear-gradient(135deg,#1A1917,#0D0C0A);border:1px solid var(--line);border-radius:2px;padding:28px;}
    .cta-block p{font-family:var(--serif);font-size:20px;font-weight:300;color:var(--warm);line-height:1.35;margin-bottom:20px;}
    .cta-block p em{font-style:italic;color:var(--accent);}
    .cta-btns{display:flex;flex-direction:column;gap:10px;}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;padding:13px 20px;border-radius:2px;cursor:pointer;transition:all .22s ease;white-space:nowrap;width:100%;}
    .btn-outline{border:1px solid rgba(240,237,231,.3);color:var(--sand);background:transparent;}
    .btn-outline:hover{border-color:var(--sand);background:rgba(240,237,231,.08);}
    .btn-accent{background:var(--accent);color:var(--stone);border:1px solid var(--accent);font-weight:500;}
    .btn-accent:hover{background:transparent;color:var(--accent);}
    .btn-ghost{border:1px solid var(--line);color:var(--warm);background:transparent;}
    .btn-ghost:hover{border-color:var(--line);color:var(--sand);background:rgba(240,237,231,.05);}

    /* RELATED */
    .related-section{padding:60px 0 100px;border-top:1px solid var(--line);}
    .related-label{font-family:var(--mono);font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--accent);margin-bottom:32px;display:flex;align-items:center;gap:10px;}
    .related-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--accent),transparent);max-width:80px;}
    .related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
    @media(max-width:700px){.related-grid{grid-template-columns:1fr;}}
    .related-card{position:relative;display:block;height:200px;border-radius:2px;overflow:hidden;border:1px solid var(--line);transition:transform .3s ease,border-color .3s ease;}
    .related-card:hover{transform:translateY(-4px);border-color:rgba(201,169,110,.3);}
    .related-img{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .5s ease,filter .3s ease;filter:saturate(.8);}
    .related-card:hover .related-img{transform:scale(1.05);filter:saturate(1);}
    .related-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(13,12,10,.85) 100%);}
    .related-meta{position:absolute;bottom:0;left:0;right:0;padding:18px;}
    .related-tag{font-family:var(--mono);font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);margin-bottom:6px;}
    .related-title{font-family:var(--serif);font-size:18px;font-weight:300;color:var(--sand);}

    /* FOOTER */
    footer{padding:40px 0;border-top:1px solid var(--line);}
    .foot{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;}
    .foot-brand{font-family:var(--serif);font-size:18px;font-weight:300;color:var(--warm);}
    .foot-copy{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
    .foot-links{display:flex;gap:24px;}
    .foot-links a{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--warm);transition:color .2s;}
    .foot-links a:hover{color:var(--accent);}

    /* MOBILE NAV */
    @media(max-width:768px){
      .nav-links{display:none;}
      .menu-btn{display:block;}
      .nav-links.open{display:flex;flex-direction:column;position:fixed;inset:0;z-index:200;background:var(--stone);justify-content:center;align-items:center;gap:20px;padding:40px;}
    }
  </style>
</head>
<body>

  <header id="hdr">
    <div class="wrap">
      <div class="nav">
        <a href="index.html" class="brand" aria-label="ZöD Studio Home">
          <span class="brand-main">ZöD</span>
          <span class="brand-sub">Studio</span>
        </a>
        <button class="menu-btn" id="menuBtn">Menu</button>
        <ul class="nav-links" id="navLinks" role="list">
          <li><a href="index.html#services">Services</a></li>
          <li><a href="index.html#process">Approach</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="index.html#contact" class="nav-cta">Contact</a></li>
        </ul>
      </div>
    </div>
  </header>

  <div class="wrap">
    <!-- BREADCRUMB -->
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="index.html">Home</a>
      <span class="sep">›</span>
      <a href="projects.html">Projects</a>
      <span class="sep">›</span>
      <span id="crumbTitle">Project</span>
    </nav>

    <!-- HERO IMAGE -->
    <div class="project-hero" aria-label="Project gallery">
      <img id="mainImg" src="work1.jpg" alt="Project image">
      <button class="hero-nav-btn prev" id="prevBtn" aria-label="Previous image">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="hero-nav-btn next" id="nextBtn" aria-label="Next image">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <div class="hero-counter" id="counter">1 / 1</div>
    </div>

    <!-- LAYOUT -->
    <div class="project-layout">

      <!-- LEFT -->
      <div>
        <!-- Thumbnails -->
        <div class="gallery-thumbs" id="thumbStrip" aria-label="Image thumbnails"></div>

        <!-- Description -->
        <div class="project-desc">
          <h2 id="pTitle">Loading…</h2>
          <p id="pDesc"></p>
        </div>
      </div>

      <!-- RIGHT SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar-block">
          <div class="sidebar-label">Project Details</div>
          <div class="specs-list" id="specsList"></div>
        </div>

        <div class="cta-block">
          <p>Interested in a similar <em>project?</em></p>
          <div class="cta-btns">
            <a class="btn btn-accent" href="index.html#contact">Contact ZöD Studio</a>
            <a class="btn btn-ghost" href="https://outlook.office.com/book/ZDStudio@zodstudio.com/" target="_blank" rel="noopener">Book a Consultation</a>
            <a class="btn btn-outline" href="projects.html">← All Projects</a>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- RELATED PROJECTS -->
  <section class="related-section">
    <div class="wrap">
      <div class="related-label">More Projects</div>
      <div class="related-grid" id="relatedGrid"></div>
    </div>
  </section>

  <footer>
    <div class="wrap">
      <div class="foot">
        <div>
          <div class="foot-brand">ZöD Studio</div>
          <div class="foot-copy" style="margin-top:6px;">© <span id="y"></span> All rights reserved.</div>
        </div>
        <nav class="foot-links">
          <a href="index.html#services">Services</a>
          <a href="about.html">About</a>
          <a href="projects.html">Projects</a>
          <a href="index.html#contact">Contact</a>
        </nav>
      </div>
    </div>
  </footer>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();

    // Header scroll
    const hdr = document.getElementById('hdr');
    window.addEventListener('scroll', () => hdr.classList.toggle('scrolled', window.scrollY > 30), {passive:true});

    // Mobile nav
    const menuBtn = document.getElementById('menuBtn');
    const navLinks = document.getElementById('navLinks');
    menuBtn.addEventListener('click', () => { navLinks.classList.toggle('open'); menuBtn.textContent = navLinks.classList.contains('open') ? 'Close' : 'Menu'; });
    navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { navLinks.classList.remove('open'); menuBtn.textContent = 'Menu'; }));

    // Project data
    const PROJECTS = {
      p1:{ title:"4 Bedroom Duplex", excerpt:"A contemporary duplex concept exploring massing, proportion, and natural light. The design balances clean geometric volumes with subtle façade detailing to create a calm modern home.", details:{Location:"Nigeria",Year:"2024",Service:"Concept Design","Site size":"450–600 sqm","Building size":"280–350 sqm"}, images:["work1.jpg","work1b.jpg","work1c.jpg","work1d.jpg"], tag:"Residential · Concept" },
      p2:{ title:"3 Bedroom Terrace Apartment", excerpt:"Exterior visualisation showcasing a compact, well-proportioned terrace apartment block with warm materials and a welcoming street frontage.", details:{Location:"Abuja, Nigeria",Year:"2023",Service:"Visualisation","Site size":"Medium-density residential","Building size":"140–180 sqm per unit"}, images:["work2.jpg","work2b.jpg","work2c.jpg","work2d.jpg","work2e.jpg","work2f.jpg"], tag:"Residential · Visualisation" },
      p3:{ title:"Mobile House", excerpt:"A sleek, modern mobile home concept designed with expansive glazing, compact planning, and a strong indoor–outdoor connection.", details:{Location:"United Kingdom",Year:"2024",Service:"Development Study","Site size":"Flexible","Building size":"28–45 sqm"}, images:["work3.jpg","work3b.jpg","work3c.jpg","work3d.jpg","work3e.jpg","work3f.jpg","work3g.jpg","work3h.jpg","work3i.jpg"], tag:"Innovation · Concept" },
      p4:{ title:"3 Bedroom Duplex", excerpt:"Exterior visuals illustrating a compact duplex design with warm textures, practical planning, and modern curb appeal.", details:{Location:"United Kingdom",Year:"2025",Service:"Exterior Visualisation","Site size":"450–500 sqm","Building size":"200–250 sqm"}, images:["work4.jpg","work4b.jpg","work4c.jpg"], tag:"Residential · Exterior" },
      p5:{ title:"Bedroom Interior Visualisation", excerpt:"Interior visual study demonstrating material contrast, lighting balance, and modern bedroom styling.", details:{Location:"Lagos, Nigeria",Year:"2023",Service:"Interior Visualization","Bedroom size":"18 sqm"}, images:["work5.jpg","work5b.jpg","work5c.jpg","work5d.jpg","work5e.jpg"], tag:"Interior · Visualisation" },
      p6:{ title:"4 Bedroom Duplex", excerpt:"Exterior and massing study for a generous four-bedroom duplex, exploring material warmth and proportion.", details:{Service:"Massing / Feasibility"}, images:["work6.jpg","work6b.jpg","work6c.jpg","work6d.jpg"], tag:"Residential · Massing" },
      p7:{ title:"3 Bedroom Duplex", excerpt:"Concept study for a three-bedroom duplex with a focus on street presence and efficient spatial planning.", details:{Service:"Concept Design"}, images:["work7.jpg","work7b.jpg","work7c.jpg","work7d.jpg"], tag:"Residential · Concept" }
    };

    const qs = new URLSearchParams(window.location.search);
    const id = qs.get('id') || 'p1';
    const data = PROJECTS[id] || PROJECTS.p1;
    const imgs = data.images || [];
    let idx = 0;

    // Populate
    document.getElementById('pTitle').textContent = data.title;
    document.getElementById('crumbTitle').textContent = data.title;
    document.getElementById('pDesc').textContent = data.excerpt || '';
    document.title = data.title + ' — ZöD Studio';

    // Specs
    document.getElementById('specsList').innerHTML = Object.entries(data.details || {}).map(([k,v]) =>
      `<div class="spec-row"><span class="spec-key">${k}</span><span class="spec-val">${v}</span></div>`
    ).join('');

    // Gallery
    const mainImg = document.getElementById('mainImg');
    const counter = document.getElementById('counter');
    const thumbStrip = document.getElementById('thumbStrip');

    function setImage(i) {
      idx = ((i % imgs.length) + imgs.length) % imgs.length;
      mainImg.src = imgs[idx];
      counter.textContent = `${idx + 1} / ${imgs.length}`;
      thumbStrip.querySelectorAll('.thumb').forEach((t, n) => t.classList.toggle('active', n === idx));
    }

    thumbStrip.innerHTML = imgs.map((src, i) =>
      `<div class="thumb ${i===0?'active':''}" data-i="${i}"><img src="${src}" alt="Thumbnail ${i+1}" loading="lazy"></div>`
    ).join('');

    thumbStrip.addEventListener('click', e => {
      const t = e.target.closest('.thumb');
      if(t) setImage(parseInt(t.dataset.i, 10));
    });

    document.getElementById('prevBtn').addEventListener('click', () => setImage(idx - 1));
    document.getElementById('nextBtn').addEventListener('click', () => setImage(idx + 1));

    // Keyboard nav
    document.addEventListener('keydown', e => {
      if(e.key === 'ArrowLeft') setImage(idx - 1);
      if(e.key === 'ArrowRight') setImage(idx + 1);
    });

    setImage(0);
    if(imgs.length <= 1) { document.getElementById('prevBtn').style.display = 'none'; document.getElementById('nextBtn').style.display = 'none'; }

    // Related projects
    const relatedIds = Object.keys(PROJECTS).filter(k => k !== id).slice(0, 3);
    document.getElementById('relatedGrid').innerHTML = relatedIds.map(rid => {
      const p = PROJECTS[rid];
      return `<a class="related-card" href="project.html?id=${rid}" aria-label="${p.title}">
        <div class="related-img" style="background-image:url('${p.images[0]}')"></div>
        <div class="related-overlay"></div>
        <div class="related-meta">
          <div class="related-tag">${p.tag || ''}</div>
          <div class="related-title">${p.title}</div>
        </div>
      </a>`;
    }).join('');
  </script>
</body>
</html>
